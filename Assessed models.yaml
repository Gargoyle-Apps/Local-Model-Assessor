# ============================================================================
# MODEL ASSESSMENT - Mac Mini M4 Pro (64GB Unified RAM)
# Generated for Ollama local deployment
# ============================================================================

# ============================================================================
# UTILITY MODELS (Always Running / Specialized)
# ============================================================================

# --- EMBEDDING MODELS ---
# These models convert text to vectors for semantic search. They run on every
# query and should be lightweight. Do NOT chat with these models.

- name: "embeddinggemma:latest"
  role: ["text_embedding", "semantic_search"]
  hardware_tier: "Utility"
  specs:
    quantization: "fp16"
    est_vram_gb: 1.5
    rec_context_window: 8192
    est_speed_tps: 1000  # Embedding models measure differently
    can_corun_with_tier_s: true
  documentation:
    description: |
      A distilled embedding model derived from the Gemma architecture. 
      Optimized for English semantic retrieval. Integrates natively with 
      the "Ollama Embed" endpoint.
    reasoning: |
      You need a local embedding model for your RAG pipeline. Gemma offers 
      a high MTEB score while remaining extremely lightweight (~1.5GB), 
      ensuring it never competes for resources with your generation models.
    caveats: |
      Strictly for vector generation. Do not attempt to chat with this model.
      English-only; use qwen3-embedding for multilingual needs.
  best_for:
    - "Indexing local documents"
    - "Semantic search queries"
    - "English-only RAG pipelines"

- name: "qwen3-embedding:large"
  role: ["multilingual_embedding", "rag_retrieval"]
  hardware_tier: "Utility"
  specs:
    quantization: "fp16"
    est_vram_gb: 2
    rec_context_window: 32768
    est_speed_tps: 800
    can_corun_with_tier_s: true
  documentation:
    description: |
      A massive multilingual embedding model supporting 100+ languages. 
      Matches the Qwen3 tokenizer for perfect compatibility with Qwen generation models.
    reasoning: |
      Use this instead of `embeddinggemma` if your documents contain non-English 
      text (Chinese, Spanish, Code). Aligns perfectly with your `qwen3` generation models.
    caveats: |
      Slightly heavier than Gemma, but worth it for multilingual support.
      Do not attempt to chat with this model.
  best_for:
    - "Multilingual document search"
    - "Codebase indexing"
    - "Non-English RAG pipelines"


# --- OCR MODELS ---
# These models extract text from images. They transcribe, not reason.
# Use for pure text extraction; use vision models for understanding.

- name: "deepseek-ocr:3b"
  role: ["ocr_utility", "visual_parsing"]
  hardware_tier: "Utility"
  specs:
    quantization: "q8_0"
    est_vram_gb: 4
    rec_context_window: 4096
    est_speed_tps: 100
    can_corun_with_tier_s: true
  documentation:
    description: |
      A specialized vision-only model designed purely for OCR (Optical Character 
      Recognition) and converting screenshots to HTML/Markdown.
    reasoning: |
      Unlike general Vision models (Qwen-VL), this is a purpose-built tool. 
      Smaller and faster for pure text extraction, freeing up larger models for reasoning.
    caveats: |
      Cannot "reason" about the image. It simply transcribes what it sees.
      For understanding images, use qwen3-vl or gemma3.
  best_for:
    - "Reading screenshots for code generation"
    - "Digitizing handwritten notes"
    - "PDF text extraction"
    - "Converting images to HTML/Markdown"


# ============================================================================
# GENERATION MODELS (By Tier)
# ============================================================================

# --- TIER S: SPEEDSTERS (<8GB) ---
# Fast models for autocomplete, quick responses, and always-on tasks.

- name: "granite4:350m"
  role: ["autocomplete", "fim_completion"]
  hardware_tier: "Tier S"
  specs:
    quantization: "q8_0"
    est_vram_gb: 0.7
    rec_context_window: 32768
    est_speed_tps: 200
    can_corun_with_tier_s: true
  documentation:
    description: |
      IBM's tiniest Granite 4 model. 350M parameters with native Fill-In-the-Middle 
      (FIM) support. Designed specifically for code completions and structured output.
    reasoning: |
      The ultimate autocomplete model. At 700MB, it's nearly invisible to VRAM 
      while providing enterprise-grade FIM completions. Perfect for IDE integration.
    caveats: |
      Limited reasoning. Use only for quick completions, not complex generation.
      32K context is smaller than larger variants.
  best_for:
    - "Code autocomplete (FIM)"
    - "Inline suggestions"
    - "Ultra-low-latency responses"

- name: "granite4:3b"
  role: ["autocomplete", "enterprise_formatter"]
  hardware_tier: "Tier S"
  specs:
    quantization: "q4_k_m"
    est_vram_gb: 2.1
    rec_context_window: 128000
    est_speed_tps: 120
    can_corun_with_tier_s: true
  documentation:
    description: |
      IBM Granite 4 "Micro" model. 3B parameters with native FIM support,
      tool calling, and 128K context. Multilingual (12 languages).
    reasoning: |
      The best balance of speed and capability for autocomplete. Native FIM 
      support makes it ideal for code completion. Tool calling enables 
      lightweight agentic tasks.
    caveats: |
      Enterprise-focused; can feel "dry" for creative tasks.
  best_for:
    - "Code autocomplete with long context"
    - "Lightweight function calling"
    - "JSON/structured output generation"

- name: "granite4:1b"
  role: ["autocomplete", "small_tasks"]
  hardware_tier: "Tier S"
  specs:
    quantization: "fp16"  # Higher precision at this size
    est_vram_gb: 3.3
    rec_context_window: 128000
    est_speed_tps: 100
    can_corun_with_tier_s: true
  documentation:
    description: |
      IBM Granite 4 at 1B parameters. Larger file size than 3B due to fp16 
      quantization, but may offer better quality for precision-sensitive tasks.
    reasoning: |
      Use when you need slightly more capability than 350m but want to stay 
      very lightweight. Good for quick Q&A and simple formatting tasks.
    caveats: |
      Larger file size than 3B variant due to less aggressive quantization.
      May not be the best choice unless you need fp16 precision.
  best_for:
    - "Quick Q&A"
    - "Simple text formatting"
    - "Precision-sensitive small tasks"

- name: "gemma3:4b"
  role: ["autocomplete", "vision_utility"]
  hardware_tier: "Tier S"
  specs:
    quantization: "q4_k_m"
    est_vram_gb: 3.3
    rec_context_window: 128000
    est_speed_tps: 100
    can_corun_with_tier_s: true
  documentation:
    description: |
      Google's latest Gemma 3 in its compact 4B form. Supports both text and 
      image input with a massive 128K context window. Excellent quality-to-size ratio.
    reasoning: |
      Alternative to Granite for autocomplete when you need vision capability.
      Good for quick image descriptions alongside code completion.
    caveats: |
      No native FIM support like Granite. Use Granite for pure code autocomplete.
  best_for:
    - "Quick image descriptions"
    - "Fast chat responses"
    - "Vision + text autocomplete"

- name: "ministral-3:3b"
  role: ["autocomplete", "agentic_utility"]
  hardware_tier: "Tier S"
  specs:
    quantization: "q4_k_m"
    est_vram_gb: 3.0
    rec_context_window: 256000
    est_speed_tps: 120
    can_corun_with_tier_s: true
  documentation:
    description: |
      Mistral's edge-optimized 3B model with vision and native function calling.
      Designed specifically for low-latency deployment on constrained hardware.
    reasoning: |
      Best-in-class agentic capabilities at this size. Native tool use makes it 
      ideal for lightweight automation tasks. 256K context is exceptional for a 3B model.
    caveats: |
      Requires Ollama 0.13.1+. Quality ceiling is lower than 8B variants.
  best_for:
    - "Lightweight function calling"
    - "Edge automation scripts"
    - "Mobile/embedded use cases"

- name: "qwen3-vl:8b"
  role: ["vision_utility", "screenshot_analysis"]
  hardware_tier: "Tier S"
  specs:
    quantization: "q4_k_m"
    est_vram_gb: 6.1
    rec_context_window: 128000
    est_speed_tps: 80
    can_corun_with_tier_s: true
  documentation:
    description: |
      The most powerful vision-language model in the Qwen family at a runnable size.
      Supports image analysis, GUI understanding, visual coding, and 256K native context.
    reasoning: |
      This is your primary vision workhorse. At 6.1GB it fits comfortably in Tier S
      while offering Tier D-level visual understanding. Can analyze screenshots, 
      generate code from mockups, and understand spatial relationships.
    caveats: |
      Heavier than deepseek-ocr for pure text extraction. Use OCR for simple transcription,
      this model for understanding what you're looking at.
  best_for:
    - "Screenshot-to-code generation"
    - "UI/UX analysis"
    - "Visual debugging"
    - "Document understanding with images"

- name: "ministral-3:8b"
  role: ["vision_utility", "agentic_utility"]
  hardware_tier: "Tier S"
  specs:
    quantization: "q4_k_m"
    est_vram_gb: 6.0
    rec_context_window: 256000
    est_speed_tps: 80
    can_corun_with_tier_s: true
  documentation:
    description: |
      Mistral's 8B edge model with vision, native function calling, and 256K context.
      Apache 2.0 licensed. Multilingual support for dozens of languages.
    reasoning: |
      Alternative to qwen3-vl:8b with stronger agentic/tool-use capabilities.
      Choose this when you need reliable function calling with visual input.
    caveats: |
      Requires Ollama 0.13.1+. Slightly less visual reasoning depth than Qwen3-VL.
  best_for:
    - "Visual agent tasks"
    - "Agentic workflows with images"
    - "Multilingual vision tasks"


# --- TIER M: MIDDLEWEIGHTS (8-12GB) ---
# Daily use models. Fast enough for interactive chat, capable enough for most tasks.

- name: "gemma3:12b"
  role: ["daily_driver", "vision_utility"]
  hardware_tier: "Tier M"
  specs:
    quantization: "q4_k_m"
    est_vram_gb: 8.1
    rec_context_window: 128000
    est_speed_tps: 50
    can_corun_with_tier_s: true
  documentation:
    description: |
      Google's Gemma 3 at 12B parameters. The sweet spot of the Gemma family—
      capable vision-language model with 128K context that still runs fast.
    reasoning: |
      Excellent Daily Driver candidate. Fast enough for interactive use (50 t/s),
      capable enough for most tasks, and vision-enabled. The "Goldilocks" model.
    caveats: |
      May struggle with highly complex reasoning. Step up to Tier D/H for those cases.
  best_for:
    - "General purpose assistant"
    - "Code review with screenshots"
    - "Document Q&A with images"

- name: "granite4:14b"
  role: ["enterprise_formatter", "compliance_check"]
  hardware_tier: "Tier M"
  specs:
    quantization: "q5_k_m"
    est_vram_gb: 10
    rec_context_window: 32768
    est_speed_tps: 45
    can_corun_with_tier_s: true
  documentation:
    description: |
      IBM's 4th generation "Granite" model at 14B. Focused on enterprise reliability, 
      JSON formatting, and strict adherence to system instructions without 
      "safety refusals" common in consumer models.
    reasoning: |
      Perfect for the "boring" jobs. If you need data formatted into a perfect 
      JSON structure or a SQL query generated without conversational filler, 
      Granite is the most reliable choice.
    caveats: |
      Not a conversationalist. Lacks "personality." Don't use for creative writing.
  best_for:
    - "JSON/XML Data formatting"
    - "SQL Generation"
    - "Legal text summarization"
    - "Structured output pipelines"

- name: "ministral-3:14b"
  role: ["daily_driver", "agentic_utility"]
  hardware_tier: "Tier M"
  specs:
    quantization: "q4_k_m"
    est_vram_gb: 9.1
    rec_context_window: 256000
    est_speed_tps: 45
    can_corun_with_tier_s: true
  documentation:
    description: |
      Mistral's largest Ministral 3 variant. Vision-enabled with 256K context,
      native function calling, and strong multilingual support.
    reasoning: |
      The best Tier M model for agentic tasks. Superior tool use and system prompt
      adherence. Consider this your "reliable assistant" for automation.
    caveats: |
      Requires Ollama 0.13.1+. Not the strongest at creative writing.
  best_for:
    - "Complex automation workflows"
    - "Multi-step tool use"
    - "Long-context agent tasks"


# --- TIER D: DAILY DRIVERS (12-24GB) ---
# Workhorses. Strong capability, leaves headroom for context.

- name: "gpt-oss:20b"
  role: ["reasoning_engine", "daily_driver"]
  hardware_tier: "Tier D"
  specs:
    quantization: "mxfp4"  # Native OpenAI quantization
    est_vram_gb: 14
    rec_context_window: 128000
    est_speed_tps: 35
    can_corun_with_tier_s: true
  documentation:
    description: |
      OpenAI's open-weight reasoning model. 20B parameters with MoE architecture.
      Native chain-of-thought, function calling, and configurable reasoning effort.
      Apache 2.0 licensed.
    reasoning: |
      This is your primary reasoning engine. Full chain-of-thought visibility,
      agentic capabilities, and OpenAI-level quality at 14GB. The "thinking" tag
      indicates native reasoning support.
    caveats: |
      No vision capability. Pair with qwen3-vl for visual tasks.
      Reasoning effort increases latency—use "low" for speed, "high" for accuracy.
  best_for:
    - "Complex problem solving"
    - "Code debugging with explanation"
    - "Multi-step reasoning tasks"
    - "Agentic tool orchestration"

- name: "deepseek-v3.1:16b"
  role: ["rag_synthesizer", "math_solver"]
  hardware_tier: "Tier D"
  specs:
    quantization: "q4_k_m"
    est_vram_gb: 12
    rec_context_window: 32768
    est_speed_tps: 40
    can_corun_with_tier_s: true
  documentation:
    description: |
      An updated "Lite" version of DeepSeek V3. Uses refined Mixture-of-Experts 
      architecture tailored for dense information synthesis and mathematical reasoning.
    reasoning: |
      Excellent for RAG. MoE architecture means only a fraction of parameters 
      activate per token, enabling larger effective context within VRAM budget.
    caveats: |
      Can be dry/robotic in tone. Optimized for accuracy over flair.
      Context limited to 32k to maintain stability—KV cache grows quickly.
  best_for:
    - "Summarizing 10+ documents"
    - "Math and step-by-step logic"
    - "RAG synthesis pipelines"

- name: "qwen3-coder:30b"
  role: ["coding_editor", "agentic_utility"]
  hardware_tier: "Tier D"
  specs:
    quantization: "q4_k_m"
    est_vram_gb: 19
    rec_context_window: 64000
    est_speed_tps: 25
    can_corun_with_tier_s: true
  documentation:
    description: |
      Alibaba's flagship coding model. 30B total parameters with only 3.3B activated 
      (MoE architecture). Exceptional agentic capabilities trained via reinforcement 
      learning on SWE-Bench. Native 256K context support.
    reasoning: |
      This is your primary code generation workhorse. The MoE architecture means 
      it runs faster than a dense 30B while maintaining quality. Designed specifically 
      for real-world software engineering tasks.
    caveats: |
      At 19GB, leaves ~31GB for context. Recommended to cap at 64k for stability.
      For simple edits, use granite4:3b for speed.
  best_for:
    - "Repository-scale code understanding"
    - "Complex refactoring"
    - "Agentic coding tasks (SWE-Bench style)"
    - "Multi-file code generation"

- name: "gemma3:27b"
  role: ["daily_driver", "heavy_lifter"]
  hardware_tier: "Tier D"
  specs:
    quantization: "q4_k_m"
    est_vram_gb: 17
    rec_context_window: 64000
    est_speed_tps: 25
    can_corun_with_tier_s: true
  documentation:
    description: |
      Google's flagship Gemma 3 model. The "most capable model that runs on a 
      single GPU" per Google. Vision-enabled with 128K native context.
    reasoning: |
      Strong alternative to qwen3:72b with better speed/quality tradeoff.
      At 17GB it leaves comfortable headroom while approaching Heavy Lifter quality.
    caveats: |
      Not quite Tier H quality for the most nuanced tasks. Step up to qwen3:72b 
      when quality is paramount.
  best_for:
    - "High-quality general assistant"
    - "Complex document analysis with images"
    - "Creative writing"


# --- TIER H: HEAVY LIFTERS (30-48GB) ---
# Quality-critical. Slow but nuanced. Use sparingly.

- name: "qwen3:72b"
  role: ["heavy_lifter", "creative_writing"]
  hardware_tier: "Tier H"
  specs:
    quantization: "q3_k_m"  # Aggressive quantization required to fit
    est_vram_gb: 38
    rec_context_window: 4096
    est_speed_tps: 15
    can_corun_with_tier_s: false  # No headroom for co-running
  documentation:
    description: |
      The flagship dense model of the Qwen3 family. At 72B parameters, it rivals 
      proprietary frontier models in world knowledge and nuance.
    reasoning: |
      This is your "Tier H" (Heavy Lifter). By using `q3_k_m`, we squeeze this 
      massive model into ~38GB VRAM. This leaves ~12GB system overhead. 
      It is the model you call when smaller models fail to capture the nuance 
      of a creative prompt.
    caveats: |
      Runs close to the metal. Context is strictly limited to 4k-8k to prevent OOM. 
      Speed will be slower (~15 t/s) due to memory bandwidth saturation.
      Cannot co-run with other models.
  best_for:
    - "Writing novels or complex emails"
    - "Nuanced roleplay"
    - "Final polish of important text"
    - "Quality-critical generation"


# ============================================================================
# Section 2: Role Architecture
# ============================================================================
#
# CREATIVE QUALITY TIERS:
# Many non-coding roles benefit from a quality/speed tradeoff:
#   🎨 Creative S  — Quick brainstorming, first drafts, iteration (Tier S/M models)
#   🎨 Creative D  — Substantive drafts, good quality (Tier D models)  
#   🎨 Creative H  — Publication-ready, maximum nuance (Tier H models)
#
# For roles with creative_tier options, choose based on:
#   - Speed needed vs. quality required
#   - Draft stage vs. final polish
#   - Iteration count (more iterations = use faster model)
#
# ============================================================================

role_description_table:

  # =========================================================================
  # UTILITY ROLES
  # =========================================================================
  
  - role: "Embedding Engine"
    assigned_model: "embeddinggemma:latest"
    alternates: ["qwen3-embedding:large"]
    tier: "Utility"
    est_speed_tps: 1000
    primary_responsibility: |
      Vector search. Converting user queries and files into numbers 
      for the database.
    interaction_notes: |
      Invisible to the user. Runs on every query before generation begins.
      Use qwen3-embedding for multilingual content.

  - role: "OCR Engine"
    assigned_model: "deepseek-ocr:3b"
    tier: "Utility"
    est_speed_tps: 100
    primary_responsibility: |
      Visual transcription. Converting pixels to raw text.
    interaction_notes: |
      Running in a sidecar loop, feeding text into the Coding Engine 
      or RAG database. Use this for pure extraction, qwen3-vl for understanding.

  # =========================================================================
  # TECHNICAL ROLES (Coding & Development)
  # =========================================================================

  - role: "Autocomplete Engine"
    assigned_model: "granite4:3b"
    alternates: ["granite4:350m", "gemma3:4b", "ministral-3:3b"]
    tier: "Tier S"
    est_speed_tps: 120
    primary_responsibility: |
      Fast inline code and text completion. Sub-100ms response time target.
      Native FIM (Fill-In-the-Middle) support for code.
    interaction_notes: |
      Always running in the background. Feeds quick suggestions to the IDE.
      Use granite4:350m for absolute minimum latency.
      Swap to gemma3:4b when vision is needed in autocomplete.

  - role: "Vision Engine"
    assigned_model: "qwen3-vl:8b"
    alternates: ["ministral-3:8b", "gemma3:12b"]
    tier: "Tier S"
    est_speed_tps: 80
    primary_responsibility: |
      Screenshot analysis, UI understanding, visual debugging.
    interaction_notes: |
      Called when images are present in the workflow. Feeds visual context 
      to coding models. Use deepseek-ocr:3b for pure text extraction.

  - role: "Coding Engine"
    assigned_model: "qwen3-coder:30b"
    alternates: ["gpt-oss:20b"]
    tier: "Tier D"
    est_speed_tps: 25
    primary_responsibility: |
      Repository-scale code generation and refactoring.
    interaction_notes: |
      Primary model for agentic coding tasks. Can understand entire repos 
      at 64k context. Falls back to gpt-oss for reasoning-heavy debugging.

  - role: "Formatter"
    assigned_model: "granite4:14b"
    alternates: ["granite4:3b"]
    tier: "Tier M"
    est_speed_tps: 45
    primary_responsibility: |
      Structured output. Ensuring data is strictly formatted (JSON, SQL) 
      without conversational filler.
    interaction_notes: |
      The final step in many pipelines to convert "thoughts" into 
      "database entries" or API payloads. Use granite4:3b for simple formatting.

  # =========================================================================
  # WRITING & COMPOSITION ROLES
  # =========================================================================

  - role: "Creative Writer"
    assigned_model: "gemma3:27b"
    alternates: ["qwen3:72b", "gemma3:12b"]
    tier: "Tier D"
    creative_tier:
      draft: "gemma3:12b"      # Creative S - Fast iteration
      quality: "gemma3:27b"    # Creative D - Good drafts
      polish: "qwen3:72b"      # Creative H - Final quality
    est_speed_tps: 25
    primary_responsibility: |
      Fiction, poetry, and narrative prose. Voice, style, and emotional depth.
    interaction_notes: |
      Use gemma3:12b for brainstorming and drafts, gemma3:27b for substantive 
      writing, qwen3:72b only for final polish of important pieces.

  - role: "Copywriter"
    assigned_model: "gemma3:12b"
    alternates: ["gpt-oss:20b", "gemma3:27b"]
    tier: "Tier M"
    creative_tier:
      draft: "gemma3:12b"
      quality: "gpt-oss:20b"
      polish: "gemma3:27b"
    est_speed_tps: 50
    primary_responsibility: |
      Marketing copy, ads, taglines, and persuasive content. 
      Punchy, memorable, action-oriented writing.
    interaction_notes: |
      Speed matters for iteration. Start with gemma3:12b for variations,
      use gpt-oss:20b when reasoning about audience, gemma3:27b for hero copy.

  - role: "Technical Writer"
    assigned_model: "granite4:14b"
    alternates: ["gpt-oss:20b", "gemma3:12b"]
    tier: "Tier M"
    est_speed_tps: 45
    primary_responsibility: |
      Documentation, manuals, how-to guides, and instructional content.
      Clear, structured, and precise.
    interaction_notes: |
      Granite excels here—no personality needed, just clarity and structure.
      Use gpt-oss for complex explanations requiring reasoning chains.

  # =========================================================================
  # ANALYSIS & ASSESSMENT ROLES
  # =========================================================================

  - role: "Document Analyst"
    assigned_model: "deepseek-v3.1:16b"
    alternates: ["gpt-oss:20b", "gemma3:27b"]
    tier: "Tier D"
    requires_embedding: true
    embedding_model: "embeddinggemma:latest"
    est_speed_tps: 40
    primary_responsibility: |
      Read, summarize, and extract insights from business documents.
      Works with RAG pipeline to handle documents exceeding context limits.
    interaction_notes: |
      Pair with Embedding Engine for large document sets. Feed retrieved
      chunks to this model for synthesis. Best for factual extraction.

  - role: "Writing Critic"
    assigned_model: "gpt-oss:20b"
    alternates: ["gemma3:27b", "qwen3:72b"]
    tier: "Tier D"
    creative_tier:
      quick: "gemma3:12b"      # Fast feedback
      thorough: "gpt-oss:20b"  # Reasoned critique
      expert: "qwen3:72b"      # Nuanced assessment
    est_speed_tps: 35
    primary_responsibility: |
      Assess writing quality, provide feedback, identify strengths and 
      weaknesses. Covers business docs, creative writing, and academic work.
    interaction_notes: |
      Use chain-of-thought reasoning for detailed critiques. gpt-oss shows
      its work. For taste/nuance judgments, step up to gemma3:27b or qwen3:72b.

  - role: "Contract Reviewer"
    assigned_model: "granite4:14b"
    alternates: ["gpt-oss:20b"]
    tier: "Tier M"
    est_speed_tps: 45
    primary_responsibility: |
      Legal and compliance document review. Identify clauses, flag risks,
      summarize terms. Precision over creativity.
    interaction_notes: |
      Granite's enterprise focus and instruction-following make it ideal.
      For complex legal reasoning, escalate to gpt-oss:20b.

  - role: "Research Synthesizer"
    assigned_model: "deepseek-v3.1:16b"
    alternates: ["gpt-oss:20b"]
    tier: "Tier D"
    requires_embedding: true
    embedding_model: "qwen3-embedding:large"
    est_speed_tps: 40
    primary_responsibility: |
      Combine multiple research sources into coherent summaries.
      Handle academic papers, reports, and mixed-source research.
    interaction_notes: |
      Full RAG pipeline: Embedding Engine indexes sources, this model 
      synthesizes retrieved chunks. Use qwen3-embedding for multilingual
      or code-heavy research. MoE architecture handles large context well.

