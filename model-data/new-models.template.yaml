# Model assessment output template
# Copy to model-data/new-models.yaml and fill in. Then: python3 scripts/add-model-from-yaml.py model-data/new-models.yaml
# See LLM-prompts/model-assessment-prompt.yaml and LLM-prompts/ollama-search.md

models:
  model-name:tag:
    vram: 12
    ctx: 32768
    class: Daily Driver
    tps: 40
    # Optional (only if true): vision, tools, reasoning, moe, fim, structured, multilingual
    url: https://ollama.com/library/model-name
    install: ollama pull model-name:tag

    # Provisioning: role-tuned clones.
    # Only declare alias, role, variant, and parameter overrides here.
    # The import script derives modelfile_content, modelfile_path,
    # create_command, and pull_command — those live only in the DB.
    # Naming convention: base:tag_role_ctxk (e.g. model-name:tag_coding_8k)
    provisioning:
      - alias: "model-name:tag_coding_8k"
        role: coding
        variant: primary
        num_ctx: 8192
        temperature: 0.2
        # num_predict: 4096        # optional — max tokens to generate
        # system_prompt: "..."     # optional — SYSTEM line baked into the Modelfile

by_role:
  # Add role assignments for new models. Existing roles are preserved.
  role_name:
    variant: model-name:tag

by_constraint:
  # Add new models to constraints. Existing entries are preserved.
  has_tools: [model-name:tag]
  has_vision: [model-name:tag]
  has_reasoning: [model-name:tag]

model_docs:
  model-name:tag:
    description: "1-2 sentence summary."
    best_for: "Use case 1, use case 2"
    caveats: "Known limitations or requirements"
