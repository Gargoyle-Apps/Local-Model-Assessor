# Software Profile for Local Model Assessment
# Copy this file to software-profile.yaml and edit to match your environment
#   cp software-profile.template.yaml software-profile.yaml

# IDE (mandatory) - The integrated development environment running the model selector
ide:
  name: "Your IDE"
  url: "https://example.com/docs"
  settings_file: ".your-ide/settings.json"
  description: "Primary IDE for development and model selection"

# Embedded Coding Assistant (optional) - Comes with the IDE if available
embedded_assistant:
  name: "Built-in Assistant"
  url: "https://example.com/docs"
  settings_file: ".your-ide/settings.json"
  description: "Built-in chat assistant if available"
  optional: true
  derived_from_ide: true

# Primary Coding Assistant Agent (mandatory) - Main agent for executing tasks
primary_agent:
  name: "Your Primary Agent"
  url: "https://example.com/docs"
  settings_file: ".agent-config"
  description: "Primary AI coding agent for complex multi-step tasks"
  mandatory: true

# Additional Coding Assistant Agents (optional) - Can be used alongside primary agent
optional_agents:
  - name: "Secondary Agent"
    url: "https://example.com/docs"
    settings_file: ".agent-config"
    description: "Optional secondary coding assistant agent"
    optional: true

# Model Runtime (mandatory) — Ollama is the supported local stack for assessments, DB, and IDE generator.
# Optional notes about other tools belong in your local docs; agent orchestration stays in AGENTS.md.
model_runtime:
  name: "Ollama"
  url: "https://ollama.com"
  description: "Local model runtime - required for all model operations"
  mandatory: true
